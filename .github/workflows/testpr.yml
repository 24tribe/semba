on: pull_request

jobs:
  default:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: '2.2.10'

    - name: Meson test
      uses: BSFishy/meson-build@v1.0.3
      with:
        meson-version: 1.11.0
        action: test
        setup-options: -Dwarning_level=3
        options: -v